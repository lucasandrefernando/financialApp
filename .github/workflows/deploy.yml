name: Build and Deploy to KingHost

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'public/**'
  workflow_dispatch:

concurrency:
  group: kinghost-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          VITE_APP_BASE_PATH: /financialApp/
        run: npm run build:kinghost

      - name: Commit built files to main
        run: |
          set -e
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          # Evita push rejeitado quando outro job/commit avancou a branch.
          git checkout -B main
          git pull --rebase origin main

          git add public/
          if git diff --staged --quiet; then
            echo "Nenhuma alteracao de build para commit."
            exit 0
          fi

          git commit -m "chore: update built files [skip ci]"

          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin main; then
              echo "Push concluido na tentativa $attempt."
              exit 0
            fi
            echo "Tentativa $attempt falhou. Repetindo em 5s..."
            sleep 5
          done

          echo "Falha ao fazer push apos 3 tentativas."
          exit 1

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: main" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Hora**: $(date)" >> $GITHUB_STEP_SUMMARY
