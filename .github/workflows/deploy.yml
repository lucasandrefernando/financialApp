name: Build and Deploy to KingHost

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'public/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
        run: npm run build

      - name: Commit built files to main
        run: |
          rm -rf ./public
          cp -r dist/ ./public
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add public/
          git diff --staged --quiet || git commit -m "chore: update built files [skip ci]"
          git push

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: main" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Hora**: $(date)" >> $GITHUB_STEP_SUMMARY
